<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SHMOCARD — Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="ds-shared.jsx"></script>
<script type="text/babel" src="ds-foundations.jsx"></script>
<script type="text/babel" src="ds-color-type.jsx"></script>
<script type="text/babel" src="ds-components.jsx"></script>
<script type="text/babel" src="ds-product.jsx"></script>

<script type="text/babel" data-presets="react">
const { useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#FF5B1F",
  "surface": "#FFF1DC",
  "heroMascot": "hero-charge"
}/*EDITMODE-END*/;

const ACCENT_OPTIONS = [
  { label: "Ember",      value: "#FF5B1F" },
  { label: "Ember Deep", value: "#E04210" },
  { label: "Honey",      value: "#FFB833" },
  { label: "Orange",     value: "#FF7A3A" },
  { label: "Chocolate",  value: "#3B1F14" },
];
const SURFACE_OPTIONS = [
  { label: "Cream",   value: "#FFF1DC" },
  { label: "Snow",    value: "#FFF8EA" },
  { label: "Paper",   value: "#FFFFFF" },
];
const MASCOT_OPTIONS = [
  { label: "Charge",      value: "hero-charge" },
  { label: "Welcoming",   value: "hero-welcoming" },
  { label: "Solo wave",   value: "hero-solo" },
  { label: "Toolkit",     value: "hero-toolkit" },
  { label: "Crew",        value: "hero-crew" },
  { label: "Celebrating", value: "celebrating" },
];

function App() {
  const [tweaks, setTweaks] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    document.documentElement.style.setProperty("--graham", tweaks.accent);
    document.documentElement.style.setProperty("--tomato", tweaks.accent);
    document.body.style.background = tweaks.surface;
  }, [tweaks]);

  return (
    <>
      <TopBar />
      <main className="page">
        <Hero mascot={tweaks.heroMascot} />
        <Foundations />
        <Colors />
        <Typography />
        <Iconography />
        <Components />
        <SubBrands />
        <ProductCards />
        <DashboardMockup />
      </main>
      <Footer />

      <TweaksPanel title="Tweaks">
        <TweakSection title="Brand">
          <TweakSelect
            label="Accent color"
            value={tweaks.accent}
            options={ACCENT_OPTIONS}
            onChange={(v) => setTweaks({ accent: v })}
          />
          <TweakSelect
            label="Page surface"
            value={tweaks.surface}
            options={SURFACE_OPTIONS}
            onChange={(v) => setTweaks({ surface: v })}
          />
        </TweakSection>
        <TweakSection title="Hero">
          <TweakSelect
            label="Mascot pose"
            value={tweaks.heroMascot}
            options={MASCOT_OPTIONS}
            onChange={(v) => setTweaks({ heroMascot: v })}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>

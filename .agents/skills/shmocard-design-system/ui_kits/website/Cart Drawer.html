<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cart drawer — Shmocard design system</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../components.css">
<style>
  body { background: #efe9dc; }

  /* Each artboard is a 440×920 cart-of-page frame so we see the whole drawer */
  .ab-frame {
    width: 440px; height: 920px;
    position: relative;
    background: var(--color-marshmallow);
    overflow: hidden;
    font-family: var(--font-body);
  }
  .ab-frame .shm-cart {
    position: absolute;
    inset: 0;
    width: 100%;
    transform: none;
    box-shadow: none;
  }
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <rect width="200" height="200" fill="#FFFBF1"/>
    <rect x="60" y="40" width="100" height="120" rx="10" fill="#FFF8EA" stroke="#3B1F14" stroke-width="3"/>
    <rect x="72" y="58" width="76" height="10" rx="3" fill="#FF5B1F"/>
    <rect x="72" y="78" width="50" height="6" rx="2" fill="#3B1F14" opacity="0.3"/>
    <rect x="72" y="92" width="76" height="20" rx="4" fill="#FFFBF1" stroke="#3B1F14" stroke-width="2"/>
    <rect x="72" y="120" width="76" height="20" rx="4" fill="#FFFBF1" stroke="#3B1F14" stroke-width="2"/>
    <rect x="72" y="148" width="76" height="14" rx="7" fill="#FF5B1F"/>
  </svg>
</template>

<div id="root"></div>

<script type="text/babel">

const { useState } = React;

const PRODUCT_THUMB = "../../assets/products/cr80-flat-pair-thumb.png";
const CARD_THUMB = "../../assets/products/cr80-trio-thumb.png";

/* ─── SVG icons for milestones ───────────────────────────────── */
const IconApp = () =>
<svg viewBox="0 0 16 16" fill="none">
    <rect x="3" y="2" width="10" height="12" rx="2" stroke="currentColor" strokeWidth="1.6" />
    <circle cx="8" cy="11.5" r="0.8" fill="currentColor" />
  </svg>;

const IconGuide = () =>
<svg viewBox="0 0 16 16" fill="none">
    <path d="M3 3h7l3 3v7H3z" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round" />
    <path d="M5.5 8h5M5.5 10.5h3" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" />
  </svg>;

const IconShip = () =>
<svg viewBox="0 0 16 16" fill="none">
    <rect x="1.5" y="5" width="8" height="6" stroke="currentColor" strokeWidth="1.6" />
    <path d="M9.5 7h3l2 2v2h-5z" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round" />
    <circle cx="5" cy="12" r="1.3" stroke="currentColor" strokeWidth="1.4" />
    <circle cx="11.5" cy="12" r="1.3" stroke="currentColor" strokeWidth="1.4" />
  </svg>;

const IconGift = () =>
<svg viewBox="0 0 16 16" fill="none">
    <rect x="2" y="6" width="12" height="8" stroke="currentColor" strokeWidth="1.6" />
    <path d="M2 9h12M8 6v8" stroke="currentColor" strokeWidth="1.4" />
    <path d="M5 6c0-1.5 1-2.5 2-2.5s1 1 1 2.5M11 6c0-1.5-1-2.5-2-2.5s-1 1-1 2.5" stroke="currentColor" strokeWidth="1.4" />
  </svg>;


/* ─── Header ──────────────────────────────────────────────── */
const Header = ({ count, onClose }) =>
<header className="shm-cart__head">
    <h2 className="shm-cart__title">
      Your cart <span className="shm-cart__count">{count} {count === 1 ? "item" : "items"}</span>
    </h2>
    <button className="shm-cart__close" aria-label="Close cart" onClick={onClose}>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
      </svg>
    </button>
  </header>;


/* ─── Reminder banner ─────────────────────────────────────── */
const Reminder = () =>
<div className="shm-cart-reminder" style={{ fontSize: "10px" }}>
    <b>Heads up:</b> activate your cards in the Shmocard app the moment they arrive.
  </div>;


/* ─── Milestones row (max 4 nodes) ────────────────────────── */
const Milestones = ({ subtotal, threshold = 75 }) => {
  // milestones unlock progressively as subtotal grows
  const ms = [
  { key: "app", label: "Shmocard app", at: 0, icon: <IconApp /> },
  { key: "guide", label: "Free ebook", at: 25, icon: <IconGuide /> },
  { key: "ship", label: "Free shipping", at: threshold, icon: <IconShip /> },
  { key: "gift", label: "Mystery gift", at: 120, icon: <IconGift /> }];

  const fillTarget = ms.findIndex((m) => subtotal < m.at);
  const filledCount = fillTarget === -1 ? ms.length : fillTarget;
  const fillPct = (filledCount - 1) / (ms.length - 1) * 100;

  const nextMs = ms.find((m) => subtotal < m.at);
  const copy = nextMs ?
  <>Spend <b>${(nextMs.at - subtotal).toFixed(2)}</b> more to unlock {nextMs.label.toLowerCase()}.</> :
  <>You unlocked <b>everything</b>. Nice crew, nice work.</>;

  return (
    <div className="shm-cart-milestones">
      <p className="shm-cart-milestones__copy">{copy}</p>
      <div className="shm-cart-milestones__track">
        <div className="shm-cart-milestones__line">
          <div className="shm-cart-milestones__line-fill" style={{ width: Math.max(0, fillPct) + "%" }} />
        </div>
        {ms.map((m, i) =>
        <div key={m.key} className={"shm-cart-ms" + (i < filledCount ? " is-active" : "")}>
            <div className="shm-cart-ms__dot">{m.icon}</div>
            <div className="shm-cart-ms__label">{m.label}</div>
          </div>
        )}
      </div>
    </div>);

};

/* ─── Quantity stepper ────────────────────────────────────── */
const Qty = ({ value, onChange, busy }) =>
<div className="shm-qty" aria-busy={busy ? "true" : "false"}>
    <button className="shm-qty__btn" disabled={value <= 1 || busy} onClick={() => onChange(value - 1)} aria-label="Decrease">
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6h8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" /></svg>
    </button>
    <span className="shm-qty__val">{value}</span>
    <button className="shm-qty__btn" disabled={busy} onClick={() => onChange(value + 1)} aria-label="Increase">
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M6 2v8M2 6h8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" /></svg>
    </button>
  </div>;


/* ─── Line item (supports gift / strikethrough) ───────────── */
const LineItem = ({ item, onQty, onRemove, loading }) => {
  const total = item.price * item.qty;
  const wasTotal = (item.was || 0) * item.qty;
  const saved = wasTotal - total;
  return (
    <article className={"shm-cart-item" + (loading ? " is-loading" : "") + (item.gift ? " is-gift" : "")}>
      <div className="shm-cart-item__thumb"><img src={item.img} alt="" /></div>
      <div className="shm-cart-item__main">
        <h3 className="shm-cart-item__name">
          {item.gift && <span className="shm-badge shm-badge--ember" style={{ marginRight: 8, verticalAlign: "middle" }}>Free</span>}
          {item.name}
        </h3>
        <span className="shm-cart-item__price">
          {item.was && <span className="shm-cart-item__price-was">${wasTotal.toFixed(2)}</span>}
          ${total.toFixed(2)}
        </span>
        {item.gift && <p className="shm-cart-item__save">You save ${saved.toFixed(2)}</p>}
        {!item.gift && item.finish &&
        <p className="shm-cart-item__meta">
            <span><b>Finish:</b> {item.finish}</span>
            <span><b>Logo:</b> {item.logo}</span>
          </p>
        }
        <div className="shm-cart-item__row">
          {item.gift ?
          <span className="shm-cart-item__meta" style={{ margin: 0 }}><b>Bundled with your order</b></span> :
          <Qty value={item.qty} busy={loading} onChange={(q) => onQty(item.id, q)} />}
          {!item.gift &&
          <button className="shm-cart-item__remove" onClick={() => onRemove(item.id)}>Remove</button>
          }
        </div>
      </div>
    </article>);

};

/* ─── Upsell — 2-column grid, one product per cell ───────── */
const Upsell = () =>
<div className="shm-cart-upsell">
    <h4 className="shm-cart-upsell__title">Round it out</h4>
    <div className="shm-cart-upsell__grid">
      {[
    { name: "Acrylic table stand", price: "from $12", img: PRODUCT_THUMB },
    { name: "Window decal pack", price: "from $4", img: CARD_THUMB },
    { name: "Spare lanyard + clip", price: "from $8", img: PRODUCT_THUMB }].
    map((p) =>
    <button className="shm-cart-upsell__card" key={p.name}>
          <div className="shm-cart-upsell__thumb"><img src={p.img} alt="" /></div>
          <div className="shm-cart-upsell__body">
            <div className="shm-cart-upsell__name">{p.name}</div>
            <div className="shm-cart-upsell__price">{p.price}</div>
          </div>
          <span className="shm-cart-upsell__plus" aria-label="Add">+</span>
        </button>
    )}
    </div>
  </div>;


/* ─── Payment methods strip ───────────────────────────────── */
const Payments = () =>
<div className="shm-cart-payments">
    {["Visa", "MC", "Amex", "Apple Pay", "G Pay", "PayPal"].map((p) =>
  <span key={p} className="shm-cart-payments__chip">{p}</span>
  )}
  </div>;


/* ─── Footer / summary ────────────────────────────────────── */
const Footer = ({ subtotal, shipping, tax, total, reductions = 0, reductionLabel, discountOpen }) =>
<footer className="shm-cart__foot">
    <details className="shm-cart-discount" open={discountOpen}>
      <summary>Have a code?</summary>
      <div className="shm-cart-discount__row">
        <input type="text" placeholder="Discount code" defaultValue="" />
        <button>Apply</button>
      </div>
    </details>

    <div className="shm-cart-summary">
      <div className="shm-cart-summary__row"><span>Subtotal</span><span>${subtotal.toFixed(2)}</span></div>
      {reductions > 0 &&
    <div className="shm-cart-summary__row shm-cart-summary__row--reduction">
          <span>Reductions {reductionLabel && <span className="shm-badge">{reductionLabel}</span>}</span>
          <span>– ${reductions.toFixed(2)}</span>
        </div>
    }
      <div className="shm-cart-summary__row"><span>Shipping</span><span>{shipping === 0 ? <em>Free</em> : `$${shipping.toFixed(2)}`}</span></div>
      <div className="shm-cart-summary__row"><span>Tax (est.)</span><span>${tax.toFixed(2)}</span></div>
      <div className="shm-cart-summary__row shm-cart-summary__row--total"><span>Total</span><span>${total.toFixed(2)}</span></div>
    </div>

    <button className="shm-cart-cta">
      Tap to checkout — ${total.toFixed(2)}
    </button>

    <Payments />
  </footer>;


/* ─── State A: 1–2 items, building toward free shipping ─── */
function StateAB() {
  const [items, setItems] = useState([
  { id: 1, name: "CR-80 NFC card", price: 24, qty: 2, finish: "Matte cream", logo: "Single-color", img: PRODUCT_THUMB }]
  );
  const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
  const shipping = subtotal >= 75 ? 0 : 6;
  const tax = subtotal * 0.085;
  const total = subtotal + shipping + tax;
  return (
    <aside className="shm-cart is-open" aria-hidden="false">
      <Header count={items.reduce((s, i) => s + i.qty, 0)} />
      <Reminder />
      <Milestones subtotal={subtotal} />
      <div className="shm-cart__body">
        {items.map((it) =>
        <LineItem key={it.id} item={it}
        onQty={(id, q) => setItems(items.map((i) => i.id === id ? { ...i, qty: Math.max(1, q) } : i))}
        onRemove={(id) => setItems(items.filter((i) => i.id !== id))} />
        )}
        <Upsell />
      </div>
      <Footer subtotal={subtotal} shipping={shipping} tax={tax} total={total} />
    </aside>);

}

/* ─── State B: bundle + gift line items + reductions ─── */
function StateBundle() {
  const items = [
  { id: 1, name: "Ebook: #1 on Google in 2 months", price: 0, was: 19.99, qty: 1, gift: true, img: CARD_THUMB },
  { id: 2, name: "CR-80 NFC card", price: 24, qty: 5, finish: "Matte cream", logo: "Full color", img: PRODUCT_THUMB }];

  const raw = items.reduce((s, i) => s + (i.was ?? i.price) * i.qty, 0);
  const reductions = items.reduce((s, i) => s + ((i.was ?? i.price) - i.price) * i.qty, 0) + 18; // bundle savings
  const subtotal = raw - reductions;
  const shipping = 0;
  const tax = subtotal * 0.085;
  const total = subtotal + shipping + tax;
  return (
    <aside className="shm-cart is-open" aria-hidden="false">
      <Header count={6} />
      <Reminder />
      <Milestones subtotal={subtotal} />
      <div className="shm-cart__body">
        {items.map((it) => <LineItem key={it.id} item={it} onQty={() => {}} onRemove={() => {}} />)}
        <Upsell />
      </div>
      <Footer subtotal={raw} reductions={reductions} reductionLabel="Crew bundle" shipping={shipping} tax={tax} total={total} discountOpen />
    </aside>);

}

/* ─── State C: free-ship progress (mid-range) ─── */
function StateProgress() {
  const items = [
  { id: 1, name: "CR-80 NFC card", price: 24, qty: 1, finish: "Matte cream", logo: "Single-color", img: PRODUCT_THUMB },
  { id: 2, name: "Acrylic table stand", price: 12, qty: 2, finish: "Clear", logo: "—", img: CARD_THUMB }];

  const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
  const shipping = 6;
  const tax = subtotal * 0.085;
  const total = subtotal + shipping + tax;
  return (
    <aside className="shm-cart is-open" aria-hidden="false">
      <Header count={items.reduce((s, i) => s + i.qty, 0)} />
      <Reminder />
      <Milestones subtotal={subtotal} />
      <div className="shm-cart__body">
        {items.map((it) => <LineItem key={it.id} item={it} onQty={() => {}} onRemove={() => {}} />)}
        <Upsell />
      </div>
      <Footer subtotal={subtotal} shipping={shipping} tax={tax} total={total} />
    </aside>);

}

/* ─── State D: loading qty update ─── */
function StateLoading() {
  const items = [
  { id: 1, name: "CR-80 NFC card", price: 24, qty: 3, finish: "Matte cream", logo: "Full color", img: PRODUCT_THUMB }];

  const subtotal = 72;
  const shipping = 6;
  const tax = subtotal * 0.085;
  const total = subtotal + shipping + tax;
  return (
    <aside className="shm-cart is-open" aria-hidden="false">
      <Header count={3} />
      <Reminder />
      <Milestones subtotal={subtotal} />
      <div className="shm-cart__body">
        {items.map((it) => <LineItem key={it.id} item={it} loading onQty={() => {}} onRemove={() => {}} />)}
        <Upsell />
      </div>
      <Footer subtotal={subtotal} shipping={shipping} tax={tax} total={total} />
    </aside>);

}

/* ─── Interactive demo ─── */
function InteractiveDemo() {
  const [open, setOpen] = useState(true);
  const [items, setItems] = useState([
  { id: 1, name: "CR-80 NFC card", price: 24, qty: 2, finish: "Matte cream", logo: "Single-color", img: PRODUCT_THUMB },
  { id: 2, name: "Acrylic stand", price: 12, qty: 1, finish: "Clear", logo: "—", img: CARD_THUMB }]
  );
  const [busyId, setBusyId] = useState(null);
  const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
  const shipping = subtotal >= 75 ? 0 : 6;
  const tax = subtotal * 0.085;
  const total = subtotal + shipping + tax;
  const count = items.reduce((s, i) => s + i.qty, 0);

  const onQty = (id, q) => {
    setBusyId(id);
    setTimeout(() => {
      setItems((prev) => prev.map((i) => i.id === id ? { ...i, qty: Math.max(1, q) } : i));
      setBusyId(null);
    }, 500);
  };
  const onRemove = (id) => setItems(items.filter((i) => i.id !== id));

  return (
    <div style={{ position: "relative", width: "100%", height: "100%", overflow: "hidden", background: "var(--color-cream)" }}>
      <div style={{ padding: "24px", display: "grid", gap: "16px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <strong style={{ fontFamily: "var(--font-wordmark)", fontSize: 24, color: "var(--color-cocoa-deep)" }}>shmo<span style={{ color: "var(--color-ember)" }}>Card</span></strong>
          <button
            onClick={() => setOpen(true)}
            style={{
              display: "inline-flex", alignItems: "center", gap: 8,
              height: 40, padding: "0 16px", borderRadius: 999,
              border: "1px solid var(--color-cocoa-deep)",
              background: "var(--color-marshmallow)", color: "var(--color-cocoa-deep)",
              fontWeight: 700, cursor: "pointer", fontFamily: "var(--font-body)"
            }}>
            🛒 Cart · {count}
          </button>
        </div>
        <div style={{ padding: "32px 16px", textAlign: "center", color: "var(--color-ink-3)", fontSize: 14 }}>
          Click the cart button to re-open.<br />Try +/– on the qty (mock 500 ms loading).
        </div>
      </div>

      <div className={"shm-scrim" + (open ? " is-open" : "")} onClick={() => setOpen(false)} />
      <aside className={"shm-cart" + (open ? " is-open" : "")} aria-hidden={!open}>
        <Header count={count} onClose={() => setOpen(false)} />
        <Reminder />
        <Milestones subtotal={subtotal} />
        <div className="shm-cart__body">
          {items.map((it) =>
          <LineItem key={it.id} item={it} loading={busyId === it.id} onQty={onQty} onRemove={onRemove} />
          )}
          <Upsell />
        </div>
        <Footer subtotal={subtotal} shipping={shipping} tax={tax} total={total} />
      </aside>
    </div>);

}

/* ─── Mount on canvas ─── */
const { DesignCanvas, DCSection, DCArtboard } = window;
const App = () =>
<DesignCanvas title="Cart drawer" subtitle="Right-side, 440px · reminder + milestones + 2-col upsell + payments">
    <DCSection id="states" title="States">
      <DCArtboard id="1-2-items" label="A · 1–2 items (working toward free ship)" width={440} height={920}>
        <div className="ab-frame"><StateAB /></div>
      </DCArtboard>
      <DCArtboard id="bundle" label="B · Bundle + gift line + reductions" width={440} height={920}>
        <div className="ab-frame"><StateBundle /></div>
      </DCArtboard>
      <DCArtboard id="progress" label="C · Free-ship progress (mid-range)" width={440} height={920}>
        <div className="ab-frame"><StateProgress /></div>
      </DCArtboard>
      <DCArtboard id="loading" label="D · Loading qty update" width={440} height={920}>
        <div className="ab-frame"><StateLoading /></div>
      </DCArtboard>
    </DCSection>
    <DCSection id="interactive" title="Interactive">
      <DCArtboard id="live" label="Click around — open/close, qty +/-, remove" width={440} height={920}>
        <div className="ab-frame"><InteractiveDemo /></div>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>;


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>

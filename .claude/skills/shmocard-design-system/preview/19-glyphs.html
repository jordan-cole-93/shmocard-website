<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .glyph-grid { display: flex; gap: 18px; flex-wrap: wrap; }
  .glyph-cell { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .glyph-tile {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px;
    border-radius: var(--radius-sm);
    padding: 9px;
    box-sizing: border-box;
  }
  .glyph-tile img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }
</style>
</head>
<body><div class="card">
  <div class="col">
    <span class="shm-eyebrow">Sub-brand glyphs — 44px tile</span>
    <div class="glyph-grid">
      <div class="glyph-cell">
        <span class="glyph-tile" style="background: var(--color-ember);">
          <img src="../assets/mascot/wordmark-smore.png" alt="">
        </span>
        <span class="hex">Review · ember</span>
      </div>
      <div class="glyph-cell">
        <span class="glyph-tile" style="background: var(--color-cocoa-deep);">
          <img src="../assets/mascot/wordmark-smore.png" alt="">
        </span>
        <span class="hex">Biz · cocoa-deep</span>
      </div>
      <div class="glyph-cell">
        <span class="glyph-tile" style="background: var(--color-honey);">
          <img src="../assets/mascot/wordmark-smore.png" alt="">
        </span>
        <span class="hex">Link · honey</span>
      </div>
      <div class="glyph-cell">
        <span class="glyph-tile" style="background: var(--color-chocolate);">
          <img src="../assets/mascot/wordmark-smore.png" alt="">
        </span>
        <span class="hex">Rep · chocolate</span>
      </div>
    </div>
    <p class="token" style="margin:0;">Official mascot on a 44×44 tile, <code>--radius-sm</code>. One sub-brand color per tile from the s'more palette — mascot stays unchanged so the glyph reads as one family.</p>
  </div>
</div></body></html>

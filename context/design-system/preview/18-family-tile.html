<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .ft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .ft-tile {
    position: relative;
    min-height: 200px;
    display: flex; flex-direction: column;
  }
  .ft-glyph {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px;
    border-radius: var(--radius-sm);
    padding: 9px;
    box-sizing: border-box;
  }
  .ft-glyph img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .ft-tile h3 { margin: 14px 0 0; }
  .ft-tile p { margin: 6px 0 0; }
  .ft-cta {
    margin-top: auto; padding-top: 18px;
    font-size: 13px; font-weight: 600;
  }
</style>
</head>
<body><div class="card card-marsh">
  <div class="col">
    <span class="shm-eyebrow">Sub-brand tile</span>
    <div class="ft-grid">
      <div class="shm-card ft-tile">
        <span class="shm-badge shm-badge--ember" style="position:absolute; top:18px; right:18px;">Available now</span>
        <span class="ft-glyph" style="background: var(--color-ember);">
          <img src="../assets/mascot/wordmark-smore.png" alt="">
        </span>
        <h3 class="shm-h3">Shmo <em>Review</em></h3>
        <p class="shm-body">One tap. One five-star review.</p>
        <div class="ft-cta" style="color: var(--color-ember);">Shop now →</div>
      </div>
      <div class="shm-card ft-tile">
        <span class="shm-badge" style="position:absolute; top:18px; right:18px;">Coming soon</span>
        <span class="ft-glyph" style="background: var(--color-cocoa-deep);">
          <img src="../assets/mascot/wordmark-smore.png" alt="">
        </span>
        <h3 class="shm-h3">Shmo <em>Biz</em></h3>
        <p class="shm-body">Your business card, upgraded.</p>
        <div class="ft-cta" style="color: var(--color-ink-3);">Get notified →</div>
      </div>
    </div>
    <p class="token" style="margin:0;">Standard <code>.shm-card</code> · soft outline · 22px radius · status badge top-right · 44px sub-brand glyph (mascot on tile color) top-left.</p>
  </div>
</div></body></html>

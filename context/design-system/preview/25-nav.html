<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&display=swap" rel="stylesheet">
<style>
  .nav-bar {
    background: rgba(255,251,241,0.85); backdrop-filter: blur(8px);
    border: 1px solid var(--color-hair);
    border-radius: var(--radius-md);
    padding: 10px 16px; min-height: 64px;
    display: flex; align-items: center; gap: 18px;
    white-space: nowrap;
  }
  .nav-logo { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; flex-shrink: 0; }
  .nav-logo img { width: 28px; height: 28px; display: block; }
  .nav-mark { font-family: var(--font-wordmark); font-size: 22px; line-height: 1; letter-spacing: -0.01em; }
  .nav-mark .wm-shmo { color: var(--color-cocoa-deep); }
  .nav-mark .wm-card { color: var(--color-ember); }
  .nav-link { font-family: var(--font-sans); font-size: 13px; color: var(--color-ink-3); display: inline-flex; align-items: center; gap: 6px; }
  .nav-cart {
    position: relative;
    width: 40px; height: 40px; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 999px;
    background: transparent;
    border: 1.5px solid var(--color-cocoa-deep);
    color: var(--color-cocoa-deep);
    cursor: pointer;
    transition: background 120ms;
  }
  .nav-cart:hover { background: var(--color-marshmallow); }
  .nav-cart svg { width: 20px; height: 20px; }
  .nav-cart__count {
    position: absolute; top: -4px; right: -4px;
    min-width: 18px; height: 18px; padding: 0 5px;
    border-radius: 999px;
    background: var(--color-ember); color: var(--color-marshmallow);
    font-family: var(--font-display); font-weight: 800; font-size: 10px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1.5px solid var(--color-marshmallow);
    line-height: 1;
  }
</style>
</head>
<body><div class="card">
  <div class="col">
    <span class="shm-eyebrow">Sticky nav</span>
    <div class="nav-bar">
      <a class="nav-logo" href="#">
        <img src="../assets/mascot/wordmark-smore.png" alt="">
        <span class="nav-mark"><span class="wm-shmo">Shmo</span><span class="wm-card">Card</span></span>
      </a>
      <span class="nav-link">Review <span class="shm-badge shm-badge--status shm-badge--status-clover" style="font-size:9px; padding:2px 7px;">Live</span></span>
      <span class="nav-link">Biz</span>
      <span class="nav-link">Link</span>
      <span style="flex:1;"></span>
      <button class="nav-cart" aria-label="Cart, 2 items">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 7h14l-1.5 9.2a2 2 0 0 1-2 1.7H8.5a2 2 0 0 1-2-1.7L5 7Z"/>
          <path d="M9 7V5.5a3 3 0 0 1 6 0V7"/>
        </svg>
        <span class="nav-cart__count">2</span>
      </button>
      <a class="shm-btn shm-btn--primary shm-btn--sm">Shop →</a>
    </div>
    <p class="token" style="margin:0;">Marshmallow @ 85% with backdrop-blur. Wordmark left (mascot + Cherry Bomb One), sub-brand links center, cart icon + primary CTA right. Cart count badge uses ember on marshmallow ring; hides at 0.</p>
  </div>
</div></body></html>
